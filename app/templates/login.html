<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie – SmartLoad AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        xercik: {
                            bg: '#0a0a0a',
                            surface: '#121212',
                            card: '#1a1a1a',
                            border: '#2a2a2a',
                            text: '#f2f2f2',
                            muted: '#a0a0a0'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Subtle animated background */
        .bg-animate {
            background-size: 200% 200%;
            animation: moveBg 10s ease infinite;
        }

        @keyframes moveBg {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }
    </style>
    <script>
        (function () {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>

<body class="bg-slate-50 dark:bg-xercik-bg text-slate-800 dark:text-xercik-text min-h-screen flex items-center justify-center p-4 transition-colors duration-300">
    <!-- Decorative abstract background shapes -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-500/20 dark:bg-blue-600/10 blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-violet-500/20 dark:bg-violet-600/10 blur-[100px]"></div>
    </div>

    <!-- Login Card -->
    <div class="w-full max-w-md bg-white dark:bg-xercik-surface border border-slate-200 dark:border-xercik-border rounded-3xl shadow-xl p-8 relative overflow-hidden backdrop-blur-sm transition-colors">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="w-14 h-14 mx-auto rounded-2xl bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center shadow-lg shadow-blue-500/30 mb-5">
                <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 dark:text-white mb-2 tracking-tight">Witaj w SmartLoad AI</h1>
            <p class="text-sm text-slate-500 dark:text-xercik-muted">Zaloguj się, aby uzyskać dostęp do panelu spedycyjnego.</p>
        </div>

        {% if error %}
        <div class="mb-6 p-3 bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-900/60 rounded-xl text-center flex items-center justify-center gap-2">
            <svg class="w-5 h-5 text-red-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <span class="text-sm font-medium text-red-600 dark:text-red-400">{{ error }}</span>
        </div>
        {% endif %}

        <!-- Form -->
        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label for="username" class="block text-xs font-semibold text-slate-600 dark:text-xercik-muted uppercase tracking-wide mb-2">Nazwa Użytkownika</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-slate-400 dark:text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <input type="text" id="username" name="username" required
                        class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-xercik-card border border-slate-200 dark:border-xercik-border text-slate-800 dark:text-xercik-text text-sm rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder-slate-400 dark:placeholder-slate-500 shadow-inner"
                        placeholder="Wpisz swój login">
                </div>
            </div>

            <div>
                <label for="password" class="block text-xs font-semibold text-slate-600 dark:text-xercik-muted uppercase tracking-wide mb-2">Hasło</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-slate-400 dark:text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7z" />
                        </svg>
                    </div>
                    <input type="password" id="password" name="password" required
                        class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-xercik-card border border-slate-200 dark:border-xercik-border text-slate-800 dark:text-xercik-text text-sm rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder-slate-400 dark:placeholder-slate-500 shadow-inner"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-blue-500/30 transition-all duration-200 mt-2 transform active:scale-[0.98]">
                Zaloguj się
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 dark:border-xercik-border text-center">
            <p class="text-xs text-slate-500 dark:text-xercik-muted">SmartLoad AI © 2026. Wszelkie prawa zastrzeżone.</p>
        </div>
    </div>
</body>

</html>
