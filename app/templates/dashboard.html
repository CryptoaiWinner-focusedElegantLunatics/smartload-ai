<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLoad AI - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 p-8 font-sans">

    <div class="max-w-7xl mx-auto relative">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-blue-600">SmartLoad AI 🚀</h1>
                <p class="text-slate-500 text-sm mt-1">Inteligentna klasyfikacja maili spedycyjnych</p>
            </div>
            <div class="bg-white px-4 py-2 rounded shadow text-sm font-semibold text-green-600 border border-green-200">
                🟢 System Online
            </div>
        </header>

        <div class="bg-white p-4 rounded-lg shadow mb-6 flex gap-4 items-end">
            <div class="flex-1">
                <label class="block text-xs text-slate-500 uppercase font-bold mb-1">Szukaj w temacie / nadawcy</label>
                <input type="text" id="searchInput" placeholder="np. Trans.eu, DE-PL..." 
                       class="w-full border border-slate-300 rounded p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div class="w-64">
                <label class="block text-xs text-slate-500 uppercase font-bold mb-1">Kategoria AI</label>
                <select id="categoryFilter" class="w-full border border-slate-300 rounded p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition cursor-pointer">
                    <option value="WSZYSTKIE">Wszystkie kategorie</option>
                    <option value="OFERTA">Tylko OFERTY</option>
                    <option value="ZAMOWIENIE">Tylko ZAMÓWIENIA</option>
                    <option value="FAKTURA">Tylko FAKTURY</option>
                    <option value="DOKUMENT_CMR">Tylko CMR</option>
                    <option value="INNE">Inne (Spam)</option>
                </select>
            </div>
            <div>
                <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded transition shadow">
                    Filtruj
                </button>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100 text-slate-600 text-sm border-b border-slate-200">
                        <th class="p-4 font-semibold w-1/4">Nadawca</th>
                        <th class="p-4 font-semibold">Temat</th>
                        <th class="p-4 font-semibold w-40">Kategoria AI</th>
                        <th class="p-4 font-semibold w-24 text-right">Akcje</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100 text-sm">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="emailModal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-50 flex items-center justify-center p-4 z-50 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col transform transition-all">
            <div class="p-6 border-b border-slate-100 flex justify-between items-start">
                <div class="pr-8">
                    <h2 id="modalSubject" class="text-xl font-bold text-slate-800 leading-tight">Temat maila</h2>
                    <p class="text-sm text-slate-500 mt-2">Od: <span id="modalSender" class="font-semibold text-slate-700"></span></p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 transition text-2xl font-bold leading-none">&times;</button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1 bg-slate-50">
                <div class="mb-4">
                    <span id="modalCategory" class="px-3 py-1 rounded-full text-xs font-bold shadow-sm">KATEGORIA</span>
                </div>
                <div class="bg-white p-5 rounded-lg border border-slate-200 shadow-inner">
                    <p id="modalBodyText" class="text-sm text-slate-700 font-mono whitespace-pre-wrap break-words"></p>
                </div>
            </div>
            
            <div class="p-4 border-t border-slate-100 bg-white flex justify-end rounded-b-xl">
                <button onclick="closeModal()" class="bg-slate-200 hover:bg-slate-300 text-slate-800 font-semibold px-6 py-2 rounded transition">
                    Zamknij
                </button>
            </div>
        </div>
    </div>

    <script>
        // Globalna zmienna do trzymania pobranych maili, żeby modal miał do nich szybki dostęp
        let loadedEmails = [];

        const colors = {
            'OFERTA': 'bg-blue-100 text-blue-800 border-blue-200',
            'ZAMOWIENIE': 'bg-emerald-100 text-emerald-800 border-emerald-200',
            'FAKTURA': 'bg-purple-100 text-purple-800 border-purple-200',
            'DOKUMENT_CMR': 'bg-amber-100 text-amber-800 border-amber-200',
            'INNE': 'bg-slate-100 text-slate-800 border-slate-200'
        };

        async function fetchData() {
            const search = document.getElementById('searchInput').value;
            const category = document.getElementById('categoryFilter').value;
            
            let url = `/api/emails?szukaj=${encodeURIComponent(search)}&kategoria=${encodeURIComponent(category)}`;
            
            const response = await fetch(url);
            loadedEmails = await response.json(); // Zapisujemy do globalnej zmiennej
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 

            if(loadedEmails.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-500">Brak wiadomości spełniających kryteria.</td></tr>';
                return;
            }

            loadedEmails.forEach(email => {
                const badgeClass = colors[email.ai_category] || colors['INNE'];
                
                // Dodaliśmy onclick na cały <tr> i zmieniliśmy kursor na pointer
                const row = `
                    <tr onclick="openModal(${email.id})" class="hover:bg-blue-50 transition cursor-pointer group">
                        <td class="p-4 font-medium text-slate-700 truncate max-w-[200px]" title="${email.sender}">${email.sender}</td>
                        <td class="p-4 text-slate-600 truncate max-w-[300px]" title="${email.subject}">${email.subject}</td>
                        <td class="p-4">
                            <span class="px-3 py-1 rounded-full text-xs font-bold border ${badgeClass}">
                                ${email.ai_category}
                            </span>
                        </td>
                        <td class="p-4">
                            <div class="flex items-center justify-end gap-2">
                                <select onclick="event.stopPropagation()" onchange="updateCategory(${email.id}, this.value)" 
                                        class="text-xs border border-slate-300 rounded p-1.5 text-slate-600 bg-white hover:bg-slate-50 cursor-pointer outline-none focus:ring-1 focus:ring-blue-500">
                                    <option value="" disabled selected>Popraw AI</option>
                                    <option value="OFERTA">OFERTA</option>
                                    <option value="ZAMOWIENIE">ZAMÓWIENIE</option>
                                    <option value="FAKTURA">FAKTURA</option>
                                    <option value="DOKUMENT_CMR">CMR</option>
                                    <option value="INNE">INNE</option>
                                </select>
                                
                                <button onclick="archiveEmail(event, ${email.id})" class="text-slate-400 hover:text-indigo-500 transition p-1 rounded hover:bg-indigo-50" title="Archiwizuj">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function openModal(emailId) {
            const email = loadedEmails.find(e => e.id === emailId);
            if (!email) return;

            document.getElementById('modalSubject').innerText = email.subject;
            document.getElementById('modalSender').innerText = email.sender;
            document.getElementById('modalBodyText').innerText = email.body;
            
            const badge = document.getElementById('modalCategory');
            badge.innerText = email.ai_category;
            badge.className = `px-3 py-1 rounded-full text-xs font-bold border ${colors[email.ai_category] || colors['INNE']}`;
            document.getElementById('emailModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('emailModal').classList.add('hidden');
        }
        async function updateCategory(emailId, newCategory) {
            if(!newCategory) return;
            
            try {
                const response = await fetch(`/api/emails/${emailId}/category`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category: newCategory })
                });
                
                if(response.ok) {
                    fetchData();
                } else {
                    alert("Wystąpił błąd podczas zmiany kategorii.");
                }
            } catch (error) {
                console.error("Błąd API:", error);
            }
        }

        // Akcja archiwizacji na przyszłość
        async function archiveEmail(event, emailId) {
            // Zatrzymujemy otwarcie modala z treścią maila
            event.stopPropagation();
            
            if(confirm("Czy na pewno chcesz zarchiwizować tę wiadomość?")) {
                const response = await fetch(`/api/emails/${emailId}/archive`, { method: 'PUT' });
                const result = await response.json();
                
                // Na razie tylko alert, w przyszłości ukryjemy wiersz z tabeli
                alert(result.message);
                
                // fetchData(); // Kiedyś dodamy odświeżanie, jak backend zacznie to odfiltrowywać
            }
        }
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                closeModal();
            }
        });

        window.onload = fetchData;
        document.getElementById('categoryFilter').addEventListener('change', fetchData);
    
        let timeout = null;
        document.getElementById('searchInput').addEventListener('keyup', function() {
            clearTimeout(timeout);
            timeout = setTimeout(fetchData, 400);
        });
    </script>
</body>
</html>
